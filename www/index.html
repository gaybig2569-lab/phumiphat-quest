<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Quest Room</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #121212;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* ส่วนหัวแบนเนอร์ */
        .banner {
            position: relative;
            width: 100%;
            height: 300px;
            background-color: #1e1e1e;
            background-image: radial-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 4px 4px; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: all 0.5s ease; /* เพิ่มความนุ่มนวลเวลาเปลี่ยนสถานะ */
        }

        .top-left-text {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #ffffff;
            font-size: 14px;
            font-weight: bold;
            opacity: 0.8;
        }

        .main-title-container {
            text-align: center;
        }

        .main-title {
            color: #ffffff;
            font-size: 3.5rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            transition: color 0.5s ease;
        }

        /* เส้นใต้สถานะปกติ (สีแดง) */
        .status-line {
            width: 550px;
            max-width: 90%;
            height: 6px;
            background-color: #ff4a5a;
            margin: 0 auto;
            transition: all 0.5s ease;
        }


        /* ปุ่มทดสอบระบบ */
        .btn-test {
            margin-top: 30px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            background-color: #ff4a5a;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-test:hover {
            background-color: #e03e4d;
        }
    </style>
</head>
<body>

    <!-- แบนเนอร์หลัก -->
    <div class="banner" id="questBanner">
        <div class="top-left-text">Dairy Quest Room</div>
        
        <div class="main-title-container">
            <!-- ตั้ง id เพื่อใช้เปลี่ยนข้อความด้วย JavaScript -->
            <h1 class="main-title" id="questTitle">Daily Quest Room</h1>
            <div class="status-line"></div>
        </div>
    </div>

    <!-- ปุ่มจำลองการส่งเควสสำเร็จ -->
    <button class="btn-test" onclick="completeQuest()">Quest Completed</button>

    <script>
        function completeQuest() {
             window.location.href = "Quest Completed.html";
        }
    </script>
    

</body>
</html>
