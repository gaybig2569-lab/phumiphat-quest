<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Quest Room</title>
    <style>
       .btn-test {
            margin-top: 30px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            background-color: #5348d0;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
            /*สีพื้นหลังและการจัดเรียงกึงกลาง*/
        body {
            font-family: 'Arial', sans-serif;
            background-color: #121212;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* พื้นหลังและสัดส่วนของQuest Completed */
        .banner {
            position: relative;
            width: 100%;
            height: 300px;
            background-color: #1e1e1e;
            background-image: radial-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 4px 4px; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: all 0.5s ease; /* เพิ่มความนุ่มนวลเวลาเปลี่ยนสถานะ */
        }
            /*จัดวางDairy Quest Room*/
        .top-left-text {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #a380d3;
            font-size: 14px;
            font-weight: bold;
            opacity: 0.8;
        }
            /*จัดกลางข้อความ*/
        .main-title-container {
            text-align: center;
        }
            /*สีแอบแฟกและเวลาของQuest Completed!*/
        .main-title {
             color: #2ecc71;
             animation: pulse 5s infinite;
            font-size: 3.5rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            transition: color 0.5s ease;
        }

        /* เส้นใต้สถานะ */
        .status-line {
            width: 550px;
            max-width: 90%;
            height: 6px;
            background-color: #2ecc71;
            margin: 0 auto;
            transition: all 0.5s ease;
        }

        /* เอฟเฟกต์เรืองแสงวาบ */
        @keyframes pulse {
            0% { text-shadow: 0 0 5px rgba(46, 204, 113, 0.5); }
            50% { text-shadow: 0 0 20px rgba(46, 204, 113, 0.8); }
            100% { text-shadow: 0 0 5px rgba(46, 204, 113, 0.5); }
        }
    </style>
</head>
<body>
    
    <!-- แบนเนอร์หลัก -->
    <div class="banner" id="questBanner">
        <div class="top-left-text">Dairy Quest Room</div>
        
        <div class="main-title-container">
            <!-- ตั้ง id เพื่อใช้เปลี่ยนข้อความด้วย JavaScript -->
            <h1 class="main-title" id="questTitle">Quest Completed!</h1>
            <div class="status-line"></div>
        </div>
    </div>


                <button class="btn-test" onclick="q1()">QUSET #1 Completed</button>

                <script>
                    function q1() {
                        // เปลี่ยนหน้าทันทีไปยังลิงก์ที่ระบุ
                        window.location.href = "QUEST1/QUEST1.html"; // ใส่ชื่อไฟล์ หรือ ลิงก์ URL ที่ต้องการตรงนี้
                    }
                </script>
                                <button class="btn-test" onclick="q2()">QUSET #2 Completed</button>

                <script>
                    function q2() {
                        // เปลี่ยนหน้าทันทีไปยังลิงก์ที่ระบุ
                        window.location.href = "QUEST2/QUEST2.html"; // ใส่ชื่อไฟล์ หรือ ลิงก์ URL ที่ต้องการตรงนี้
                    }
                </script>

</body>
</html>
